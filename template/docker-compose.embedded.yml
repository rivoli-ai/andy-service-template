# Embedded mode: SQLite only, no PostgreSQL container.
# Use this for Conductor integration or standalone deployment.
#
# Usage: docker compose -f docker-compose.embedded.yml up

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        certs: ./certs
    container_name: __SERVICE_KEBAB__-embedded
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8443;http://+:8080
      - Database__Provider=Sqlite
      - ConnectionStrings__DefaultConnection=Data Source=/data/__SERVICE_SNAKE__.db
      # Cross-service URLs come from .env (generated by scripts/sync-dep-ports.sh).
      # Defaults match each dep's `service.ports.dockerHttps` since this compose
      # still runs a containerized API; the deps are also containerized.
      - AndyAuth__Authority=${ANDY_AUTH_AUTHORITY:-https://host.docker.internal:7001}
      - AndyAuth__Audience=${ANDY_AUTH_AUDIENCE:-urn:__SERVICE_KEBAB__-api}
      - Rbac__ApiBaseUrl=${ANDY_RBAC_API_BASE_URL:-https://host.docker.internal:7003}
      - Rbac__ApplicationCode=${ANDY_RBAC_APPLICATION_CODE:-__SERVICE_KEBAB__}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "__PORT_HTTPS__:8443"
      - "__PORT_HTTP__:8080"
    volumes:
      - ./certs:/usr/local/share/ca-certificates/custom:ro
      - sqlite_data:/data
      - dpkeys:/app/.aspnet/DataProtection-Keys
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8443/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  dpkeys:
  sqlite_data:
