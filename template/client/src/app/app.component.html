<header class="app-header">
  <nav class="nav-bar">
    <a class="logo" routerLink="/">{{ title }}</a>
    <div class="nav-links">
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/items" routerLinkActive="active">Items</a>
    </div>
    <div class="auth-section">
      <span *ngIf="isAuthenticated" class="user-name">{{ userName }}</span>
      <button *ngIf="!isAuthenticated" class="btn-primary" (click)="login()">Sign In</button>
      <button *ngIf="isAuthenticated" class="btn-secondary" (click)="logout()">Sign Out</button>
    </div>
  </nav>
</header>
<main class="app-content">
  <router-outlet></router-outlet>
</main>
